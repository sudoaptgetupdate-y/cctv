services:
  # 🌐 Reverse Proxy (Nginx Proxy Manager)
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: always
    ports:
      - '80:80'   # HTTP
      - '443:443' # HTTPS
      - '81:81'   # Admin UI
    volumes:
      - ./proxy_data:/data
      - ./proxy_letsencrypt:/etc/letsencrypt
    networks:
      - cctv-network

  # 🗄️ Database
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: your_root_password
      MARIADB_DATABASE: cctv_db
      MARIADB_USER: cctv_user
      MARIADB_PASSWORD: cctv_password
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - cctv-network

  # 🎥 Streaming (go2rtc)
  go2rtc:
    image: alexxit/go2rtc
    restart: always
    network_mode: host # ต้องใช้ host mode สำหรับ WebRTC/UDP
    volumes:
      - ./cctv-backend/go2rtc.yaml:/config/go2rtc.yaml

  # ⚙️ Backend API
  backend:
    build:
      context: ./cctv-backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: "mysql://cctv_user:cctv_password@db:3306/cctv_db"
      JWT_SECRET: "lkfgxifde" # ใช้จาก .env เดิมของคุณ
      PORT: 5000
      GO2RTC_URL: "http://host.docker.internal:1984" # ชี้ไปที่ Host gateway
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway" # สำคัญสำหรับ Linux Docker
    networks:
      - cctv-network

  # 💻 Frontend (React + Nginx)
  frontend:
    build:
      context: ./cctv-frontend
      dockerfile: Dockerfile
    restart: always
    networks:
      - cctv-network

networks:
  cctv-network:
    driver: bridge