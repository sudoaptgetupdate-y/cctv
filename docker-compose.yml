services:
  # 🌐 Reverse Proxy (Nginx Proxy Manager)
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: always
    ports:
      - '80:80'   # HTTP
      - '443:443' # HTTPS
      - '81:81'   # Admin UI
    volumes:
      - ./proxy_data:/data
      - ./proxy_letsencrypt:/etc/letsencrypt
    networks:
      - cctv-network

  # 🗄️ Database
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - cctv-network

  # 🎥 Streaming (go2rtc)
  go2rtc:
    image: alexxit/go2rtc
    restart: always
    network_mode: host # ต้องใช้ host mode สำหรับ WebRTC/UDP บน Linux
    volumes:
      - ./cctv-backend/go2rtc.yaml:/config/go2rtc.yaml

  # ⚙️ Backend API
  backend:
    build:
      context: ./cctv-backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: "mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}"
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      GO2RTC_URL: "http://host.docker.internal:1984"
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cctv-network

  # 💻 Frontend (React + Nginx)
  frontend:
    build:
      context: ./cctv-frontend
      dockerfile: Dockerfile
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cctv-network

networks:
  cctv-network:
    driver: bridge
