server {
    listen 80;
    server_name localhost;

    # 1. หน้าเว็บหลัก (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. go2rtc Web UI (stream.html ฯลฯ)
    location /go2rtc-ui/ {
        proxy_pass http://host.docker.internal:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 3. เจาะจงสำหรับ API ที่ go2rtc ใช้จริงๆ (เรียงลำดับใหม่)
    location ~ ^/api/(webrtc|mse|ws|mp4|hls|snapshot) {
        proxy_pass http://host.docker.internal:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 4. Backend API: เฉพาะการดึงข้อมูลสตรีมที่มี ID (เช่น /api/streams/1)
    location ~ ^/api/streams/[0-9]+$ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 5. go2rtc API: สำหรับดึงลิสต์สตรีมหรือลงทะเบียนสตรีมผ่าน Query (เช่น /api/streams?src=...)
    location /api/streams {
        proxy_pass http://host.docker.internal:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 6. General Backend API (auth, groups, logs ฯลฯ)
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
