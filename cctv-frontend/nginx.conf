server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /go2rtc-ui/ {
        proxy_pass http://host.docker.internal:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 🎥 ส่งคำขอเกี่ยวกับ Video Stream (WebRTC/MSE) ไปหา go2rtc
    location ~ ^/api/(ws|webrtc|mse|mp4|hls|snapshot) {
        proxy_pass http://host.docker.internal:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # ⚙️ ส่งคำขอจัดการสตรีม (Status/Heartbeat/Info) ไปหา Backend
    # เพิ่มการดักจับ status และ heartbeat ให้ส่งไปพอร์ต 5000
    location ~ ^/api/streams/(statuses|ping|status|heartbeat|info|webrtc) {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # รองรับ /api/streams/:id และ /api/streams/camera_...
    location ~ ^/api/streams/([0-9]+|camera_.+) {
        # ถ้ามีคำว่า /status หรือ /heartbeat ต่อท้าย ให้ Backend จัดการ
        if ($uri ~* "(status|heartbeat)$") {
            proxy_pass http://backend:5000;
        }
        # ถ้าไม่มี ให้ไปดึง Config จาก Backend เช่นกัน
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 🔗 สำหรับ API อื่นๆ ทั่วไป
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
