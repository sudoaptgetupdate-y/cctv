server {
    listen 80;
    server_name localhost;

    # 1. หน้าเว็บหลัก (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. สำหรับเข้าถึง Player UI ของ go2rtc
    location /go2rtc-ui/ {
        proxy_pass http://host.docker.internal:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 3. เจาะจงสำหรับ go2rtc API (webrtc, mse, ws)
    # Nginx จะเลือกอันที่เจาะจงที่สุดก่อน /api/ ปกติ
    location ~ ^/api/(webrtc|mse|ws|streams) {
        # ถ้าเป็นการเรียกดูข้อมูลกล้อง (มี ID เป็นตัวเลข) ให้ส่งไป Backend
        if ($request_uri ~* "/api/streams/[0-9]+") {
            proxy_pass http://backend:5000;
        }

        # นอกนั้น (การเรียกวิดีโอ) ให้ส่งไป go2rtc
        proxy_pass http://host.docker.internal:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 4. สำหรับ API Backend อื่นๆ (auth, groups, logs, etc.)
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
