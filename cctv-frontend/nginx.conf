server {
    listen 80;
    server_name localhost;

    # หน้าเว็บหลัก (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 1. สำหรับเข้าถึง Player UI ของ go2rtc (เพื่อให้หน้าเว็บแสดงผลวิดีโอได้)
    location /go2rtc-ui/ {
        proxy_pass http://host.docker.internal:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 2. สำหรับ API ของ go2rtc (ใช้ในการดึงสตรีม)
    location /api/streams/ {
        # ตรวจสอบว่าถ้าเป็นการเรียก webrtc, mse, mp4 ฯลฯ ให้ไปที่ go2rtc
        if ($query_string ~* "src=") {
            proxy_pass http://host.docker.internal:1984/api/;
        }
        
        # นอกนั้น (เช่น /api/streams/1) ให้ปล่อยผ่านไปที่ Backend ด้านล่าง
        proxy_pass http://backend:5000/api/streams/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 3. สำหรับ API Backend อื่นๆ
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
