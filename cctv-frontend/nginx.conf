server {
    listen 80;
    server_name localhost;

    # หน้าเว็บหลัก (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy สำหรับ Streaming (go2rtc) - ให้เข้าถึงผ่าน /api/streams
    location /api/streams/ {
        # ชี้ไปที่ Host Machine (เพราะ go2rtc ใช้ network_mode: host)
        proxy_pass http://host.docker.internal:1984/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # Proxy สำหรับ API Backend (auth, cameras, groups, logs, etc.)
    location /api/ {
        # ชี้ไปที่ Backend Service Port 5000
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
