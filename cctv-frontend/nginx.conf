server {
    listen 80;
    server_name localhost;

    # หน้าเว็บหลัก
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 1. เจาะจงเฉพาะ WebRTC/MSE API ของ go2rtc (เพื่อให้ไม่ทับกับ Backend)
    location ~ ^/api/streams/(webrtc|mse|mp4|hls|snapshot) {
        proxy_pass http://host.docker.internal:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # 2. ปล่อยให้ /api/streams/:id วิ่งไปที่ Backend (5000) ตามปกติ
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
