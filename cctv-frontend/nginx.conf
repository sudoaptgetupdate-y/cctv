server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 🎥 1. หัวใจหลัก: WebSocket สำหรับ Video Stream (WebRTC/MSE)
    # ต้องรับ /go2rtc-ws และส่งไปที่ go2rtc:1984/api/ws
    location /go2rtc-ws {
        proxy_pass http://host.docker.internal:1984/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 🎥 2. API สตรีมมิ่งอื่นๆ (WebRTC HTTP, Snapshot, etc.)
    location ~ ^/api/(webrtc|mse|mp4|hls|snapshot) {
        proxy_pass http://host.docker.internal:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location /go2rtc-ui/ {
        proxy_pass http://host.docker.internal:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # ⚙️ 3. จัดการ API Streams ทั้งหมด (Status, Heartbeat, Config)
    # ส่งไปที่ Backend (พอร์ต 5000) ทั้งหมดเพื่อความชัวร์
    location /api/streams/ {
        proxy_pass http://backend:5000/api/streams/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 🔗 4. สำหรับ API ทั่วไป (Auth, Users, etc.)
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
