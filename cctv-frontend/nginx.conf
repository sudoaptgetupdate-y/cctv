server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /go2rtc-ui/ {
        proxy_pass http://host.docker.internal:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        # ✅ ปิด Buffering เพื่อให้วิดีโอไหลลื่นทันที
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ~ ^/api/(ws|webrtc|mse|mp4|hls|snapshot) {
        proxy_pass http://host.docker.internal:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        # ✅ ปิด Buffering สำหรับ API วิดีโอ
        proxy_buffering off;
    }

    # ✅ ส่งเส้นทางสถานะและจัดการสตรีมไปที่ Backend
    location ~ ^/api/streams/(statuses|ping|webrtc|test) {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/api/streams/[0-9]+$ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # ✅ เส้นทางอื่นๆ ของ /api/streams ให้ส่งไปที่ go2rtc (เช่น การเรียกดูผ่าน UI ของ go2rtc)
    location /api/streams {
        proxy_pass http://host.docker.internal:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
