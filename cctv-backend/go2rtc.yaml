api:
  listen: ":1984"
  origin: "*"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  # ✅ คืนค่า STUN เพราะ Browser รุ่นใหม่มักต้องการเพื่อเริ่มกระบวนการเชื่อมต่อ
  ice_servers:
    - urls: [ "stun:stun.l.google.com:19302" ]
  # ✅ ระบุ Candidate ให้ชัดเจนที่สุด ทั้ง localhost และ IP ในวงแลน
  candidates:
    - 127.0.0.1:8555
    - 10.0.0.100:8555
    - 172.17.17.135:8555
    - host:8555


